name: Build dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build dashboard.html
        run: python3 code/scripts/build_dashboard.py

      - name: Commit if dashboard changed
        run: |
          if [ -n "$(git status --porcelain dashboard.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dashboard.html
            git commit -m "Auto: rebuild dashboard"
            git push
          else
            echo "dashboard.html unchanged — skipping commit"
          fi
